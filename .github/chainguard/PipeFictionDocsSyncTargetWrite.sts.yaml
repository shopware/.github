# Allows pipe-fiction docs-sync workflow to create docs PRs and sync reviewers

issuer: https://token.actions.githubusercontent.com
subject_pattern: repo:shopware/pipe-fiction:.*
claim_pattern:
  workflow_ref: shopware/pipe-fiction/.github/workflows/docs-sync-on-merge\.yml@.*

permissions:
  contents: write
  issues: write
  pull_requests: write

repositories:
  - pipe-fiction
